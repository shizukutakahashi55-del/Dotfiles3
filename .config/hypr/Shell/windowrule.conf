##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrules that are useful

windowrule {
    # Ignore maximize requests from all apps. You'll probably like this.
    name = suppress-maximize-events
    match:class = .*

    suppress_event = maximize
}

windowrule {
    # Fix some dragging issues with XWayland
    name = fix-xwayland-drags
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = true
    match:fullscreen = false
    match:pin = false

    no_focus = true
}

# Regla Kitty Cute
windowrule = opacity 0.9 0.9, match:float true
# windowrule = opacity 0.7 0.7, match:class kitty

# Regla para Pavucontrol (Interfaz de Audio)
windowrule {
    name = pavufloat
    match:class = org.pulseaudio.pavucontrol

    float = yes
    size = 750 600
    move = 70% 5%
}

layerrule = blur on, match:title org.pulseaudio.pavucontrol
layerrule = ignore_alpha 0.5, match:title org.pulseaudio.pavucontrol

# Regla para la terminal flotante (si usas el script de pulsemixer)
windowrule {
    name = floatkitty
    match:class = float_kitty

    float = yes
    size = 600 300
    move = 70% 5%
}

# Efecto de desenfoque (blur) swaync
layerrule = blur on, match:class swaync-control-center
layerrule = blur on, match:class swaync-notification-window

# Ignorar la transparencia para que el blur se vea sólido (sin ruido)

layerrule = ignore_alpha 0.5, match:class swaync-control-center
layerrule = ignore_alpha 0.5, match:class swaync-notification-window

# Opcional: Añadir animaciones suaves al abrir/cerrar
layerrule = animation slide right, match:class swaync-control-center

# Regla para que Spotify flote como un widget
# windowrule = float on, match:class ^(spotify)$
windowrule = size 600 400, match:class ^(spotify)$
windowrule = move center, match:class ^(spotify)$
windowrule = pin on, match:class ^(spotify)$ # Esto lo mantiene visible sobre otras apps

layerrule = blur on, match:title spotify
layerrule = ignore_alpha 0.5, match:title spotify

windowrule = float on, match:class ^(spotify-widget)$
windowrule = size 500 300, match:class ^(spotify-widget)$

# Regla para el "Widget" de Bluetooth
windowrule = float on, match:class ^(blueman-manager)$
windowrule = size 400 500, match:class ^(blueman-manager)$
windowrule = move 78% 60, match:class ^(blueman-manager)$ # Ajusta el 78% según tu monitor
windowrule = pin on, match:class ^(blueman-manager)$
windowrule = stay_focused on, match:class ^(blueman-manager)$ # Ayuda a que detecte cuando dejas de usarla
# windowrule = no_border on, match:class ^(blueman-manager)$
windowrule = rounding 15, match:class ^(blueman-manager)$

layerrule = blur on, match:title blueman-manager
layerrule = ignore_alpha 0.5, match:title blueman-manager

#Coneccion Editor rules/ nmtui

# windowrule = float on, match:class ^(nm-connection-editor)$

#windowrule = float on, match:class ^(network-widget)$
#windowrule = size 600 800, match:class ^(network-widget)$
#windowrule = move center, match:class ^(network-widget)$

windowrule = float on, match:class ^(Rofi)$
windowrule = move 65% 60, match:class ^(Rofi)$
windowrule = float on, match:class ^(bluetui)$
windowrule = size 400 500, match:class ^(bluetui)$
windowrule = move center, match:class ^(bluetui)$

windowrule = float on, match:title Wallpaper Picker
windowrule = move center, match:title Wallpaper Picker
windowrule = size 1000 300, match:title Wallpaper Picker
windowrule = opacity 1 1, match:title Wallpaper Picker

#windowrule = fullscreen 1, match:class steam_app_3564740

layerrule = no_anim on, match:namespace hotspot
layerrule = ignore_alpha on, match:namespace hotspot


windowrule = float on, match:title Waypaper


#layerrule = no_anim on, match:namespace quickshell
layerrule = xray off, match:namespace quickshell
layerrule = blur_popups on, match:namespace quickshell
layerrule = blur on, match:namespace quickshell



# WORKSPACES Rules

# Dwindle solo en workspace 8 y 9
workspace = 8, layout:dwindle
workspace = 9, layout:dwindle

#Monocle Layout
#workspace = 8, layout:monocle
workspace = 10, layout:monocle

# Hyprland-run windowrule
windowrule {
    name = move-hyprland-run

    match:class = hyprland-run

    move = 20 monitor_h-120
    float = yes
}
